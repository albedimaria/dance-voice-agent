name: Keep Supabase alive

# Supabase free projects auto-pause after 7 days with no activity. This pings
# the REST API twice a week (well under the window) so the project stays awake.
# The in-process keepalive in main.py is unreliable on Render free (the service
# spins down, killing the loop), so this external cron is the real safeguard.

on:
  schedule:
    - cron: "0 8 * * 1,4" # Mon & Thu, 08:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: https://wpdpuxhcxetyciyeecqp.supabase.co
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/settings?select=key&limit=1" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY")
          echo "HTTP $code"
          test "$code" = "200"
